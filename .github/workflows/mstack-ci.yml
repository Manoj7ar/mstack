# CI for the mstack repository (rules pack + sample API).
# Local parity: npm run mstack:ci  (scripts/mstack-ci-local.sh)
# If GitHub shows "job was not started — account locked due to a billing issue",
# fix billing on the org/account; the workflow itself is not at fault.
name: mstack CI

on:
  push:
    branches: [main, "cursor/**"]
  pull_request:
    branches: [main, "cursor/**"]

jobs:
  verify:
    runs-on: ubuntu-latest
    # Org/repo npm config sometimes sets production=true or NODE_ENV=production, which makes
    # `npm ci` skip devDependencies — then `tsc` / `vitest` are missing (fails in ~1–2s).
    env:
      NODE_ENV: development
      NPM_CONFIG_PRODUCTION: "false"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install
        # --include=dev: install devDependencies even if org sets production / omit=dev
        run: npm ci --include=dev

      - name: Pack manifest integrity
        run: npm run mstack:verify-packs

      - name: Doctor (this repo)
        run: npm run mstack:doctor

      - name: Doctor + full strict verify
        env:
          MSTACK_ROOT: ${{ github.workspace }}
          MSTACK_PACK: full
          MSTACK_VERIFY_STRICT: "1"
        run: bash scripts/mstack-doctor.sh .

      - name: Sync smoke (minimal, standard, full strict)
        env:
          MSTACK_ROOT: ${{ github.workspace }}
        run: |
          set -euo pipefail
          for p in minimal standard full; do
            d=$(mktemp -d)
            MSTACK_PACK="$p" MSTACK_ROOT="${{ github.workspace }}" bash scripts/sync-mstack.sh "$d"
            MSTACK_ROOT="${{ github.workspace }}" bash scripts/verify-mstack-sync.sh --strict "$p" "$d"
          done

      - name: Lint (tsc --noEmit)
        run: npm run lint

      - name: Test
        run: npm test
