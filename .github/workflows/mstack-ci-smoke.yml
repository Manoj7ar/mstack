# Minimal job to verify GitHub can assign a hosted runner to this repo.
# If this fails the same way as mstack-ci.yml (no step logs), the issue is
# org/repo Actions settings or runner availability—not the main workflow script.
name: mstack CI smoke

on:
  workflow_dispatch:
  push:
    branches: [main, "cursor/**"]
  pull_request:
    branches: [main, "cursor/**"]

permissions:
  contents: read

jobs:
  runner-ok:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Hosted runner reachable
        run: |
          set -euxo pipefail
          uname -a
          echo "GITHUB_REPOSITORY=${GITHUB_REPOSITORY}"
          echo "smoke OK"
